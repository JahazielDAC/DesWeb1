<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./src/css/styles.css">
</head>

<body>

<div class="container p-5 my-4 bg-light border rounded">
    <h2>Task Manager</h2>

    <form id="task-form">
        <div class="mb-3">
            <input class="form-control" type="text" id="task-input" placeholder="What needs to be done?" required>
        </div>

        <div class="mb-3">
            <select id="priority-input" class="form-select">
                <option value="Low">Low</option>
                <option value="Medium">Medium</option>
                <option value="High">High</option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary">Add Task</button>
    </form>
</div>

<div class="container">
    <h3>Tasks:</h3>

    <div class="table-responsive">
        <table class="table table-striped table-hover align-middle">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Task Description</th>
                    <th>Priority</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody id="task-list"></tbody>
        </table>
    </div>
</div>

<!-- 🔥 MODAL EDIT -->
<div class="modal fade" id="editTaskModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">

      <form id="edit-task-form">

        <div class="modal-header">
          <h5 class="modal-title">Edit Task</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">
          <input type="hidden" id="edit-task-id">

          <div class="mb-3">
            <label>Title</label>
            <input type="text" id="edit-task-title" class="form-control" required>
          </div>

          <div class="mb-3">
            <label>Priority</label>
            <select id="edit-task-priority" class="form-select">
              <option value="Low">Low</option>
              <option value="Medium">Medium</option>
              <option value="High">High</option>
            </select>
          </div>

          <div class="form-check">
            <input type="checkbox" id="edit-task-completed" class="form-check-input">
            <label class="form-check-label">Completed</label>
          </div>
        </div>

        <div class="modal-footer">
          <button type="submit" class="btn btn-primary">Save</button>
        </div>

      </form>

    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast-container position-fixed top-0 end-0 p-3">
    <div id="task-toast" class="toast align-items-center text-bg-success border-0">
        <div class="d-flex">
            <div id="task-toast-message" class="toast-body"></div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>

</body>
</html>
